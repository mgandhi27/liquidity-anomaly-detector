name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -v

      - name: Smoke test the CLI
        run: |
          python main.py simulate --out data/raw/lob_snapshots.csv --n-rows 3000
          python main.py train --data data/raw/lob_snapshots.csv --sequence-length 20 --forecast-horizon 5 --epochs 2 --patience 2
